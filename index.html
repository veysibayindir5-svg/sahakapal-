<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Kapalıdır | Yakında Döneceğiz</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background glow elements -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="container">
        <main class="card" id="main-card">
            <!-- Offline status badge -->
            <div class="status-badge">
                <span class="status-dot"></span>
                <span class="status-text">Çevrimdışı</span>
            </div>

            <!-- Main Icon / Illustration -->
            <div class="icon-container">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="maintenance-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17L17.25 21A1.5 1.5 0 0019.8 19.8l-5.83-5.83M11.42 15.17a3 3 0 11-4.24-4.24 3 3 0 014.24 4.24zm0 0l-5.38-5.38A1.5 1.5 0 013.8 2.8l5.38 5.38m2.24 2.24L4 4m16 0l-8 8" />
                </svg>
            </div>

            <h1 class="title">Bu Site Kapalıdır</h1>
            <p class="description">
                Bu site tamamen kapatılmıştır. Test için oluşturuldu.
            </p>

            <div class="divider"></div>

            <!-- Footer / Info -->
            <footer class="footer">
                <p>Bizimle iletişime geçmek ister misiniz?</p>
                <div class="social-links">
                    <a href="mailto:info@example.com" class="btn btn-primary" id="contact-btn">E-posta Gönder</a>
                </div>
            </footer>
        </main>
    </div>
    <!-- build trigger -->
</body>
</html>
